<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Bet - Depósito Confirmado</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        body {
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: #1a1a1a;
            padding: 50px 30px;
            border-radius: 30px;
            width: 100%;
            max-width: 450px;
            border: 2px solid #ff3333;
            box-shadow: 0 0 50px rgba(255, 51, 51, 0.5);
            text-align: center;
        }
        
        .checkmark {
            width: 100px;
            height: 100px;
            background: linear-gradient(45deg, #ff3333, #ff6666);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            font-size: 50px;
            color: white;
            box-shadow: 0 0 30px rgba(255, 51, 51, 0.8);
        }
        
        h1 {
            color: #ff3333;
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .valor {
            font-size: 48px;
            color: white;
            font-weight: bold;
            margin: 20px 0;
            text-shadow: 0 0 15px rgba(255, 51, 51, 0.5);
        }
        
        .valor span {
            color: #ff3333;
        }
        
        .message {
            color: #ff9999;
            font-size: 18px;
            margin: 20px 0;
            line-height: 1.6;
        }
        
        .message strong {
            color: #ff3333;
        }
        
        .saldo-box {
            background: #2a2a2a;
            border: 2px solid #ff3333;
            border-radius: 15px;
            padding: 20px;
            margin: 30px 0;
        }
        
        .saldo-label {
            color: #ff9999;
            font-size: 14px;
            margin-bottom: 5px;
        }
        
        .saldo-novo {
            color: #ff3333;
            font-size: 36px;
            font-weight: bold;
        }
        
        button {
            width: 100%;
            padding: 18px;
            background: linear-gradient(45deg, #ff3333, #ff6666);
            color: white;
            border: none;
            border-radius: 15px;
            font-weight: bold;
            font-size: 20px;
            margin: 20px 0;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .confetti {
            font-size: 40px;
            margin: 20px 0;
            animation: bounce 1s infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="checkmark">✓</div>
        
        <h1>DEPÓSITO CONFIRMADO!</h1>
        
        <div class="valor">
            <span>R$</span> <span id="valorDepositado">0,00</span>
        </div>
        
        <div class="message">
            🎉 <strong>PARABÉNS!</strong> 🎉<br>
            Seu saldo foi adicionado com sucesso!
        </div>
        
        <div class="confetti">💰 🎰 💰</div>
        
        <div class="saldo-box">
            <div class="saldo-label">SEU NOVO SALDO</div>
            <div class="saldo-novo" id="novoSaldo">R$ 0,00</div>
        </div>
        
        <div class="message">
            <strong>Agora é com você!</strong><br>
            Escolha um jogo e comece a ganhar!
        </div>
        
        <button onclick="irParaDashboard()">
            🎮 COMEÇAR A JOGAR
        </button>
    </div>
    
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const valor = parseFloat(urlParams.get('valor')) || 0;
        
        document.getElementById('valorDepositado').textContent = valor.toFixed(2);
        
        const usuarioLogado = JSON.parse(localStorage.getItem('usuario_logado'));
        if (usuarioLogado) {
            document.getElementById('novoSaldo').textContent = 'R$ ' + usuarioLogado.saldo.toFixed(2);
        }
        
        function irParaDashboard() {
            window.location.href = 'dashboard.html';
        }
        
        setTimeout(() => {
            document.querySelector('.confetti').innerHTML = '🎰 🎲 💎 🎰';
        }, 500);
    </script>
</body>
</html>
