<!DOCTYPE html>
<html>
<head>
    <title>TESTE RÁPIDO</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: black; color: white; font-family: Arial; padding: 20px; }
        input, button { width: 100%; padding: 15px; margin: 10px 0; }
        .sucesso { color: green; }
        .erro { color: red; }
    </style>
</head>
<body>
    <h1 style="color: red;">🔴 TESTE DIRETO</h1>
    
    <input type="email" id="email" value="admin@email.com">
    <input type="password" id="senha" value="123456">
    
    <button onclick="testar()">TESTAR LOGIN</button>
    
    <div id="resultado"></div>
    
    <script>
        // ===== COLE SUAS CREDENCIAIS AQUI =====
        const SUPABASE_URL = 'https://dqsstopjszttbgbtuyyy.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRxc3N0b3Bqc3p0dGJnYnR1eXl5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1OTc4NDgsImV4cCI6MjA4OTE3Mzg0OH0.6q8AinOjG2zF9xwFQtedFiAWvyA8XJsLtClBr5gxMPw';
        // =======================================
        
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        async function testar() {
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;
            
            document.getElementById('resultado').innerHTML = '⏳ VERIFICANDO...';
            
            try {
                // 1. Testar conexão
                const { data, error } = await supabase
                    .from('usuarios')
                    .select('*')
                    .eq('email', email)
                    .eq('senha', senha);
                
                if (error) {
                    document.getElementById('resultado').innerHTML = `
                        <div class="erro">
                            ❌ ERRO NO BANCO:<br>
                            ${error.message}<br><br>
                            🔧 Solução: Verifique URL e chave
                        </div>
                    `;
                    return;
                }
                
                if (data && data.length > 0) {
                    const user = data[0];
                    document.getElementById('resultado').innerHTML = `
                        <div class="sucesso">
                            ✅ LOGIN FUNCIONOU!<br><br>
                            👤 Nome: ${user.nome}<br>
                            📧 Email: ${user.email}<br>
                            💰 Saldo: R$ ${user.saldo}<br><br>
                            🎯 Redirecionando...
                        </div>
                    `;
                    
                    // Salvar e redirecionar
                    localStorage.setItem('usuario_logado', JSON.stringify(user));
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 2000);
                    
                } else {
                    document.getElementById('resultado').innerHTML = `
                        <div class="erro">
                            ❌ USUÁRIO NÃO ENCONTRADO<br><br>
                            🔧 Solução: Crie o admin no SQL Editor:<br>
                            <small>
INSERT INTO usuarios (nome, email, senha, saldo) 
VALUES ('Admin', 'admin@email.com', '123456', 10000);
                            </small>
                        </div>
                    `;
                }
                
            } catch (err) {
                document.getElementById('resultado').innerHTML = `
                    <div class="erro">
                        ❌ ERRO GERAL:<br>
                        ${err.message}<br><br>
                        🔧 Solução: Recarregue a página
                    </div>
                `;
            }
        }
    </script>
</body>
  </html>
