<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Bet - Apostas</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        body {
            background: #0a1a2b;
            color: white;
        }
        
        .header {
            background: rgba(15, 43, 63, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #00ff88;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .logo {
            color: #00ff88;
            font-size: 24px;
            font-weight: bold;
        }
        
        .usuario-info {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .usuario-nome {
            color: white;
            background: #1a2f3f;
            padding: 8px 15px;
            border-radius: 20px;
            border: 1px solid #00ff88;
        }
        
        .usuario-saldo {
            background: #00ff88;
            color: #0a1a2b;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: bold;
        }
        
        .btn-sair {
            background: #ff4d4d;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
        }
        
        .banner {
            background: linear-gradient(135deg, #1a4b6d, #0f2b3f);
            margin: 20px;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid #00ff88;
        }
        
        .banner h2 {
            color: #00ff88;
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .area-crash {
            background: rgba(15, 43, 63, 0.8);
            margin: 20px;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            border: 2px solid #00ff88;
        }
        
        .multiplicador {
            font-size: 72px;
            font-weight: bold;
            color: #00ff88;
            text-shadow: 0 0 30px #00ff88;
            margin: 20px 0;
            font-family: monospace;
        }
        
        .controles {
            max-width: 300px;
            margin: 0 auto;
        }
        
        .valor-aposta {
            width: 100%;
            padding: 15px;
            background: #1a2f3f;
            border: 2px solid #00ff88;
            border-radius: 15px;
            color: white;
            font-size: 18px;
            text-align: center;
            margin: 10px 0;
        }
        
        .btn-apostar {
            width: 100%;
            padding: 15px;
            background: #00ff88;
            color: #0a1a2b;
            border: none;
            border-radius: 15px;
            font-weight: bold;
            font-size: 20px;
            margin: 5px 0;
            cursor: pointer;
        }
        
        .btn-parar {
            width: 100%;
            padding: 15px;
            background: #ff4d4d;
            color: white;
            border: none;
            border-radius: 15px;
            font-weight: bold;
            font-size: 20px;
            margin: 5px 0;
            cursor: pointer;
            display: none;
        }
        
        .status {
            color: #ccc;
            margin-top: 20px;
            padding: 15px;
            background: #1a2f3f;
            border-radius: 10px;
        }
        
        .footer {
            text-align: center;
            padding: 20px;
            color: #666;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">🏆 MINHA BET</div>
        <div class="usuario-info">
            <span class="usuario-nome" id="nomeUsuario">Carregando...</span>
            <span class="usuario-saldo" id="saldoUsuario">R$ 0,00</span>
            <button class="btn-sair" onclick="sair()">Sair</button>
        </div>
    </div>
    
    <div class="banner">
        <h2>BÔNUS DE 100%</h2>
        <p>ATÉ R$500 NO PRIMEIRO DEPÓSITO</p>
    </div>
    
    <div class="area-crash">
        <h3 style="color: #00ff88; margin-bottom: 10px;">🎮 JOGO CRASH</h3>
        <div class="multiplicador" id="multiplicador">1.00x</div>
        
        <div class="controles">
            <input type="number" id="valorAposta" class="valor-aposta" value="10" min="1" step="1">
            <button class="btn-apostar" id="btnApostar" onclick="iniciarJogo()">APOSTAR R$10</button>
            <button class="btn-parar" id="btnParar" onclick="pararJogo()">RETIRAR AGORA</button>
        </div>
        
        <div class="status" id="statusJogo">
            👆 Clique em APOSTAR para começar
        </div>
    </div>
    
    <div class="footer">
        <p>⚠️ Jogue com responsabilidade | Proibido para menores de 18 anos</p>
        <p>© 2024 Minha Bet</p>
    </div>
    
    <script>
        // ============================================
        // 🚨 COLE SUAS CREDENCIAIS DO SUPABASE AQUI!
        // ============================================
        const SUPABASE_URL = 'https://SEU_ID_AQUI.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...';
        
        // ============================================
        
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        // Verifica se usuário está logado
        const usuarioLogado = JSON.parse(localStorage.getItem('usuario_logado'));
        
        if (!usuarioLogado) {
            window.location.href = 'index.html';
        }
        
        // Elementos da tela
        const nomeUsuarioEl = document.getElementById('nomeUsuario');
        const saldoUsuarioEl = document.getElementById('saldoUsuario');
        const multiplicadorEl = document.getElementById('multiplicador');
        const btnApostar = document.getElementById('btnApostar');
        const btnParar = document.getElementById('btnParar');
        const valorAposta = document.getElementById('valorAposta');
        const statusJogo = document.getElementById('statusJogo');
        
        // Estado do jogo
        let saldoAtual = usuarioLogado.saldo;
        let usuarioId = usuarioLogado.id;
        let jogoAtivo = false;
        let apostaAtual = 0;
        let multiplicadorAtual = 1.0;
        let intervaloJogo;
        
        // Mostra dados do usuário
        nomeUsuarioEl.textContent = usuarioLogado.nome;
        saldoUsuarioEl.textContent = 'R$ ' + saldoAtual.toFixed(2);
        
        // Atualiza valor do botão
        valorAposta.addEventListener('input', function() {
            btnApostar.textContent = 'APOSTAR R$' + this.value;
        });
        
        async function atualizarSaldoBanco(novoSaldo) {
            const { error } = await supabase
                .from('usuarios')
                .update({ saldo: novoSaldo })
                .eq('id', usuarioId);
            
            if (!error) {
                saldoAtual = novoSaldo;
                usuarioLogado.saldo = novoSaldo;
                localStorage.setItem('usuario_logado', JSON.stringify(usuarioLogado));
                saldoUsuarioEl.textContent = 'R$ ' + novoSaldo.toFixed(2);
            }
        }
        
        async function registrarAposta(valor, multiplicador, resultado) {
            await supabase
                .from('apostas')
                .insert([{
                    usuario_id: usuarioId,
                    valor: valor,
                    multiplicador: multiplicador,
                    resultado: resultado
                }]);
        }
        
        async function iniciarJogo() {
            if (jogoAtivo) return;
            
            const aposta = parseFloat(valorAposta.value);
            
            if (aposta <= 0 || aposta > saldoAtual) {
                alert('Valor inválido ou saldo insuficiente!');
                return;
            }
            
            await atualizarSaldoBanco(saldoAtual - aposta);
            apostaAtual = aposta;
            
            jogoAtivo = true;
            multiplicadorAtual = 1.0;
            multiplicadorEl.textContent = '1.00x';
            btnApostar.style.display = 'none';
            btnParar.style.display = 'block';
            statusJogo.textContent = '⚡ Jogo em andamento...';
            
            let tempo = 0;
            const vaiCrasharCedo = Math.random() < 0.3;
            const maxMultiplicador = vaiCrasharCedo ? 2.5 : 15;
            
            intervaloJogo = setInterval(() => {
                tempo += 0.2;
                multiplicadorAtual = Math.pow(1.3, tempo);
                
                if (multiplicadorAtual > maxMultiplicador) {
                    clearInterval(intervaloJogo);
                    multiplicadorEl.textContent = '💥 CRASH!';
                    statusJogo.textContent = `❌ Você perdeu R$ ${apostaAtual.toFixed(2)}`;
                    
                    registrarAposta(apostaAtual, multiplicadorAtual, 'perdeu');
                    
                    jogoAtivo = false;
                    btnApostar.style.display = 'block';
                    btnParar.style.display = 'none';
                } else {
                    multiplicadorEl.textContent = multiplicadorAtual.toFixed(2) + 'x';
                }
            }, 200);
        }
        
        async function pararJogo() {
            if (!jogoAtivo) return;
            
            clearInterval(intervaloJogo);
            
            const premio = apostaAtual * multiplicadorAtual;
            await atualizarSaldoBanco(saldoAtual + premio);
            
            multiplicadorEl.textContent = '✅ RETIRADO!';
            statusJogo.textContent = `🎉 Você ganhou R$ ${premio.toFixed(2)}`;
            
            registrarAposta(apostaAtual, multiplicadorAtual, 'ganhou');
            
            jogoAtivo = false;
            btnApostar.style.display = 'block';
            btnParar.style.display = 'none';
        }
        
        function sair() {
            localStorage.removeItem('usuario_logado');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
