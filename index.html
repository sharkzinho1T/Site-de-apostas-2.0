<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Bet - Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        body {
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: #1a1a1a;
            padding: 40px 30px;
            border-radius: 20px;
            width: 100%;
            max-width: 450px;
            border: 2px solid #ff3333;
            box-shadow: 0 0 30px rgba(255, 51, 51, 0.3);
        }
        
        h1 {
            color: #ff3333;
            text-align: center;
            margin-bottom: 40px;
            font-size: 36px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255, 51, 51, 0.5);
        }
        
        .linha-divisoria {
            border: none;
            height: 2px;
            background: linear-gradient(90deg, transparent, #ff3333, #ff6666, #ff3333, transparent);
            margin: 10px 0 25px 0;
            width: 100%;
        }
        
        .campo-label {
            color: #ff9999;
            font-size: 14px;
            font-weight: bold;
            margin-left: 5px;
            margin-bottom: 5px;
            display: block;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .campo-input {
            width: 100%;
            margin-bottom: 20px;
        }
        
        input {
            width: 100%;
            padding: 15px 20px;
            background: #2a2a2a;
            border: 2px solid #ff3333;
            border-radius: 10px;
            color: white;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #ff6666;
            box-shadow: 0 0 15px rgba(255, 51, 51, 0.5);
            background: #333333;
        }
        
        input::placeholder {
            color: #666;
        }
        
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, #ff3333, #ff6666);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 20px;
            margin: 30px 0 20px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 5px 15px rgba(255, 51, 51, 0.4);
        }
        
        button:active {
            transform: scale(0.98);
            background: linear-gradient(45deg, #ff1a1a, #ff4d4d);
            box-shadow: 0 2px 10px rgba(255, 51, 51, 0.8);
        }
        
        .link {
            color: #ff9999;
            text-align: center;
            margin-top: 20px;
            display: block;
            text-decoration: none;
            font-size: 16px;
        }
        
        .link:hover {
            color: #ff3333;
        }
        
        .erro {
            color: #ff3333;
            text-align: center;
            margin: 10px 0;
            display: none;
            padding: 10px;
            background: rgba(255, 51, 51, 0.1);
            border-radius: 5px;
            border-left: 4px solid #ff3333;
        }
        
        .footer-text {
            text-align: center;
            color: #666;
            font-size: 12px;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔴 LOGIN</h1>
        
        <hr class="linha-divisoria">
        
        <div id="erroLogin" class="erro">Email ou senha incorretos!</div>
        
        <div class="campo-label">E-MAIL</div>
        <div class="campo-input">
            <input type="email" id="email" placeholder="seu@email.com" value="admin@email.com">
        </div>
        
        <hr class="linha-divisoria">
        
        <div class="campo-label">SENHA</div>
        <div class="campo-input">
            <input type="password" id="senha" placeholder="Sua senha" value="123456">
        </div>
        
        <hr class="linha-divisoria">
        
        <button onclick="fazerLogin()">ENTRAR</button>
        
        <a href="cadastro.html" class="link">Não tem conta? Cadastre-se</a>
        
        <div class="footer-text">
            🔴 Bônus de R$100 no primeiro depósito
        </div>
    </div>
    
    <script>
        // ============================================
        // SUAS CREDENCIAIS DO SUPABASE (COLE AQUI!)
        // ============================================
        const SUPABASE_URL = 'https://dqsstopjszttbgbtuyyy.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRxc3N0b3Bqc3p0dGJnYnR1eXl5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1OTc4NDgsImV4cCI6MjA4OTE3Mzg0OH0.6q8AinOjG2zF9xwFQtedFiAWvyA8XJsLtClBr5gxMPw';
        
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        async function fazerLogin() {
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;
            
            const btn = document.querySelector('button');
            btn.textContent = 'ENTRANDO...';
            btn.disabled = true;
            
            try {
                const { data: usuarios, error } = await supabase
                    .from('usuarios')
                    .select('*')
                    .eq('email', email)
                    .eq('senha', senha);
                
                if (error) throw error;
                
                if (usuarios && usuarios.length > 0) {
                    const usuario = usuarios[0];
                    
                    localStorage.setItem('usuario_logado', JSON.stringify({
                        id: usuario.id,
                        nome: usuario.nome,
                        email: usuario.email,
                        whatsapp: usuario.whatsapp,
                        saldo: usuario.saldo
                    }));
                    
                    window.location.href = 'dashboard.html';
                } else {
                    document.getElementById('erroLogin').style.display = 'block';
                    btn.textContent = 'ENTRAR';
                    btn.disabled = false;
                }
            } catch (err) {
                alert('Erro: ' + err.message);
                btn.textContent = 'ENTRAR';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
