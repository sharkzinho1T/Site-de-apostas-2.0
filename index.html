<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Bet - Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #0a1a2b 0%, #1a2f3f 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: rgba(22, 43, 58, 0.95);
            backdrop-filter: blur(10px);
            padding: 40px 30px;
            border-radius: 30px;
            width: 100%;
            max-width: 400px;
            border: 1px solid rgba(0, 255, 136, 0.3);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }
        
        h1 {
            color: #00ff88;
            text-align: center;
            margin-bottom: 30px;
            font-size: 36px;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
        }
        
        input {
            width: 100%;
            padding: 15px 20px;
            margin: 10px 0;
            background: rgba(15, 43, 63, 0.8);
            border: 2px solid rgba(0, 255, 136, 0.2);
            border-radius: 15px;
            color: white;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #00ff88;
            background: rgba(15, 43, 63, 1);
        }
        
        button {
            width: 100%;
            padding: 15px;
            background: #00ff88;
            color: #0a1a2b;
            border: none;
            border-radius: 15px;
            font-weight: bold;
            font-size: 18px;
            margin: 20px 0 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        button:active {
            transform: scale(0.98);
            background: #00cc66;
        }
        
        .link {
            color: #00ff88;
            text-align: center;
            margin-top: 20px;
            display: block;
            text-decoration: none;
            font-size: 16px;
        }
        
        .erro {
            color: #ff4d4d;
            text-align: center;
            margin: 10px 0;
            display: none;
            padding: 12px;
            background: rgba(255, 77, 77, 0.1);
            border-radius: 10px;
            border-left: 4px solid #ff4d4d;
        }
        
        .info {
            color: #888;
            text-align: center;
            font-size: 12px;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏆 MINHA BET</h1>
        
        <div id="erroLogin" class="erro">Email ou senha incorretos!</div>
        
        <input type="email" id="email" placeholder="Seu email" value="admin@email.com">
        <input type="password" id="senha" placeholder="Sua senha" value="123456">
        
        <button onclick="fazerLogin()">ENTRAR</button>
        
        <a href="cadastro.html" class="link">🔰 Não tem conta? Cadastre-se</a>
        
        <p class="info">💰 Bônus de R$100 no primeiro depósito</p>
    </div>
    
    <script>
        // ============================================
        // 🔴 COLE SUAS CREDENCIAIS DO SUPABASE AQUI!
        // ============================================
        
        // 1️⃣ COLE SUA PROJECT URL entre as aspas
        const SUPABASE_URL = 'https://dqsstopjszttbgbtuyyy.supabase.co';
        
        // 2️⃣ COLE SUA ANON PUBLIC KEY entre as aspas
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRxc3N0b3Bqc3p0dGJnYnR1eXl5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1OTc4NDgsImV4cCI6MjA4OTE3Mzg0OH0.6q8AinOjG2zF9xwFQtedFiAWvyA8XJsLtClBr5gxMPw';
        
        // ============================================
        
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        async function fazerLogin() {
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;
            
            // Mostra loading
            const btn = document.querySelector('button');
            btn.textContent = 'ENTRANDO...';
            btn.disabled = true;
            
            try {
                const { data: usuarios, error } = await supabase
                    .from('usuarios')
                    .select('*')
                    .eq('email', email)
                    .eq('senha', senha);
                
                if (error) {
                    alert('Erro no banco: ' + error.message);
                    btn.textContent = 'ENTRAR';
                    btn.disabled = false;
                    return;
                }
                
                if (usuarios && usuarios.length > 0) {
                    const usuario = usuarios[0];
                    
                    localStorage.setItem('usuario_logado', JSON.stringify({
                        id: usuario.id,
                        nome: usuario.nome,
                        email: usuario.email,
                        saldo: usuario.saldo
                    }));
                    
                    window.location.href = 'apostas.html';
                } else {
                    document.getElementById('erroLogin').style.display = 'block';
                    btn.textContent = 'ENTRAR';
                    btn.disabled = false;
                }
            } catch (err) {
                alert('Erro: ' + err.message);
                btn.textContent = 'ENTRAR';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
