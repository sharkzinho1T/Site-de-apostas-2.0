<!DOCTYPE html>
<html>
<head>
    <title>LOGIN SIMPLES</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background: black;
            color: white;
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: #1a1a1a;
            padding: 30px;
            border-radius: 10px;
            width: 100%;
            max-width: 400px;
            border: 2px solid red;
        }
        h1 {
            color: red;
            text-align: center;
        }
        input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: #333;
            border: 1px solid red;
            color: white;
            border-radius: 5px;
        }
        button {
            width: 100%;
            padding: 15px;
            background: red;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            margin: 10px 0;
            cursor: pointer;
        }
        button:hover {
            background: #ff4444;
        }
        a {
            color: red;
            text-decoration: none;
            display: block;
            text-align: center;
            margin-top: 15px;
        }
        #erro {
            color: red;
            text-align: center;
            margin: 10px 0;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔴 LOGIN</h1>
        
        <div id="erro">Email ou senha incorretos!</div>
        
        <input type="email" id="email" placeholder="Email" value="admin@email.com">
        <input type="password" id="senha" placeholder="Senha" value="123456">
        
        <!-- BOTÃO COM onclick DIRETO -->
        <button onclick="fazerLogin()">ENTRAR</button>
        
        <a href="cadastro.html">Criar conta</a>
    </div>

    <script>
        // ============================================
        // COLE SUAS CREDENCIAIS AQUI!
        // ============================================
        const SUPABASE_URL = 'https://dqsstopjszttbgbtuyyy.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRxc3N0b3Bqc3p0dGJnYnR1eXl5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1OTc4NDgsImV4cCI6MjA4OTE3Mzg0OH0.6q8AinOjG2zF9xwFQtedFiAWvyA8XJsLtClBr5gxMPw';
        
        // Inicializa Supabase
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        // FUNÇÃO DE LOGIN
        function fazerLogin() {
            alert('1. Botão foi clicado!');
            
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;
            
            alert('2. Email: ' + email + ' Senha: ' + senha);
            
            // Muda texto do botão
            const btn = document.querySelector('button');
            btn.textContent = 'ENTRANDO...';
            
            // Busca usuário
            supabase
                .from('usuarios')
                .select('*')
                .eq('email', email)
                .eq('senha', senha)
                .then(result => {
                    alert('3. Resposta do banco: ' + JSON.stringify(result));
                    
                    if (result.error) {
                        alert('ERRO: ' + result.error.message);
                        btn.textContent = 'ENTRAR';
                        return;
                    }
                    
                    if (result.data && result.data.length > 0) {
                        alert('4. Usuário encontrado! Vai redirecionar!');
                        
                        // Salva usuário
                        localStorage.setItem('usuario_logado', JSON.stringify(result.data[0]));
                        
                        // REDIRECIONA
                        window.location.href = 'dashboard.html';
                    } else {
                        alert('4. Usuário não encontrado');
                        document.getElementById('erro').style.display = 'block';
                        btn.textContent = 'ENTRAR';
                    }
                })
                .catch(err => {
                    alert('ERRO CATCH: ' + err.message);
                    btn.textContent = 'ENTRAR';
                });
        }
    </script>
</body>
</html>
