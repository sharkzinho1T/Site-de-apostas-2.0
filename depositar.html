<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Bet - Depositar</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        body {
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: #1a1a1a;
            padding: 40px 30px;
            border-radius: 20px;
            width: 100%;
            max-width: 450px;
            border: 2px solid #ff3333;
            box-shadow: 0 0 30px rgba(255, 51, 51, 0.3);
        }
        
        h1 {
            color: #ff3333;
            text-align: center;
            margin-bottom: 10px;
            font-size: 32px;
            text-transform: uppercase;
        }
        
        .subtitle {
            color: #ff9999;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .saldo-atual {
            background: #2a2a2a;
            border: 1px solid #ff3333;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            margin-bottom: 30px;
        }
        
        .saldo-label {
            color: #ff9999;
            font-size: 14px;
            margin-bottom: 5px;
        }
        
        .saldo-valor {
            color: #ff3333;
            font-size: 36px;
            font-weight: bold;
            text-shadow: 0 0 15px rgba(255, 51, 51, 0.5);
        }
        
        .valor-preset {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 30px 0;
        }
        
        .preset-btn {
            background: #2a2a2a;
            border: 2px solid #ff3333;
            border-radius: 10px;
            padding: 15px;
            color: white;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .preset-btn:hover {
            background: #ff3333;
            color: white;
        }
        
        .preset-btn.selected {
            background: #ff3333;
            color: white;
            box-shadow: 0 0 15px rgba(255, 51, 51, 0.5);
        }
        
        .custom-value {
            margin: 20px 0;
        }
        
        label {
            color: #ff9999;
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
        }
        
        input {
            width: 100%;
            padding: 15px;
            background: #2a2a2a;
            border: 2px solid #ff3333;
            border-radius: 10px;
            color: white;
            font-size: 18px;
            text-align: center;
            font-weight: bold;
        }
        
        input:focus {
            outline: none;
            border-color: #ff6666;
            box-shadow: 0 0 15px rgba(255, 51, 51, 0.5);
        }
        
        button {
            width: 100%;
            padding: 18px;
            background: linear-gradient(45deg, #ff3333, #ff6666);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 20px;
            margin: 20px 0;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .info-pix {
            background: #2a2a2a;
            border-left: 4px solid #ff3333;
            padding: 15px;
            margin: 20px 0;
            color: #ff9999;
            font-size: 14px;
        }
        
        .link {
            color: #ff9999;
            text-align: center;
            display: block;
            text-decoration: none;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💰 DEPOSITAR</h1>
        <div class="subtitle">Escolha o valor que deseja depositar</div>
        
        <div class="saldo-atual">
            <div class="saldo-label">Seu saldo atual</div>
            <div class="saldo-valor" id="saldoAtual">R$ 0,00</div>
        </div>
        
        <div class="valor-preset">
            <div class="preset-btn" onclick="selectValor(20)">R$20</div>
            <div class="preset-btn" onclick="selectValor(50)">R$50</div>
            <div class="preset-btn" onclick="selectValor(100)">R$100</div>
            <div class="preset-btn" onclick="selectValor(200)">R$200</div>
            <div class="preset-btn" onclick="selectValor(500)">R$500</div>
            <div class="preset-btn" onclick="selectValor(1000)">R$1k</div>
        </div>
        
        <div class="custom-value">
            <label>Ou digite um valor personalizado:</label>
            <input type="number" id="valorCustom" placeholder="R$ 0,00" min="1" step="1">
        </div>
        
        <div class="info-pix" id="infoPix">
            💳 Chave PIX selecionada: <strong id="chavePix">carregando...</strong>
        </div>
        
        <button onclick="depositar()">
            DEPOSITAR AGORA
        </button>
        
        <a href="dashboard.html" class="link">Depois eu deposito</a>
    </div>
    
    <script>
        // ============================================
        // SUAS CREDENCIAIS DO SUPABASE (COLE AQUI!)
        // ============================================
        const SUPABASE_URL = 'https://dqsstopjszttbgbtuyyy.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRxc3N0b3Bqc3p0dGJnYnR1eXl5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1OTc4NDgsImV4cCI6MjA4OTE3Mzg0OH0.6q8AinOjG2zF9xwFQtedFiAWvyA8XJsLtClBr5gxMPw';
        
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        const usuarioLogado = JSON.parse(localStorage.getItem('usuario_logado'));
        
        if (!usuarioLogado) {
            window.location.href = 'index.html';
        }
        
        document.getElementById('saldoAtual').textContent = 'R$ ' + usuarioLogado.saldo.toFixed(2);
        
        const pixChave = localStorage.getItem('pix_chave') || 'Não definida';
        document.getElementById('chavePix').textContent = pixChave;
        
        let valorSelecionado = 0;
        
        function selectValor(valor) {
            valorSelecionado = valor;
            
            document.querySelectorAll('.preset-btn').forEach(btn => {
                btn.classList.remove('selected');
            });
            
            event.target.classList.add('selected');
            document.getElementById('valorCustom').value = '';
        }
        
        async function depositar() {
            let valor = valorSelecionado;
            
            if (valor === 0) {
                valor = parseFloat(document.getElementById('valorCustom').value);
            }
            
            if (!valor || valor <= 0) {
                alert('Selecione ou digite um valor válido!');
                return;
            }
            
            const btn = document.querySelector('button');
            btn.textContent = 'PROCESSANDO...';
            btn.disabled = true;
            
            try {
                await new Promise(resolve => setTimeout(resolve, 2000));
                
                const novoSaldo = usuarioLogado.saldo + valor;
                
                const { error } = await supabase
                    .from('usuarios')
                    .update({ saldo: novoSaldo })
                    .eq('id', usuarioLogado.id);
                
                if (error) throw error;
                
                usuarioLogado.saldo = novoSaldo;
                localStorage.setItem('usuario_logado', JSON.stringify(usuarioLogado));
                
                const deposito = {
                    usuario_id: usuarioLogado.id,
                    usuario_nome: usuarioLogado.nome,
                    valor: valor,
                    data: new Date().toISOString(),
                    pix: localStorage.getItem('pix_chave') || 'Não informado'
                };
                
                const depositosAntigos = JSON.parse(localStorage.getItem('historico_depositos') || '[]');
                depositosAntigos.push(deposito);
                localStorage.setItem('historico_depositos', JSON.stringify(depositosAntigos));
                
                localStorage.setItem('ultimo_deposito', JSON.stringify({
                    valor: valor,
                    data: new Date().toISOString(),
                    pix: localStorage.getItem('pix_chave')
                }));
                
                window.location.href = 'deposito-sucesso.html?valor=' + valor;
                
            } catch (err) {
                alert('Erro: ' + err.message);
                btn.textContent = 'DEPOSITAR AGORA';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
