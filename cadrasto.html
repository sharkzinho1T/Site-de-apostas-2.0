<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Bet - Cadastro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial; }
        body { background: #0a1a2b; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: #162b3a; padding: 30px; border-radius: 20px; width: 90%; max-width: 400px; border: 1px solid #00ff88; }
        h1 { color: #00ff88; text-align: center; margin-bottom: 30px; }
        input { width: 100%; padding: 15px; margin: 10px 0; background: #0f2b3f; border: 1px solid #00ff884d; border-radius: 10px; color: white; }
        button { width: 100%; padding: 15px; background: #00ff88; color: #0a1a2b; border: none; border-radius: 10px; font-weight: bold; font-size: 18px; margin: 10px 0; cursor: pointer; }
        .link { color: #00ff88; text-align: center; margin-top: 20px; display: block; text-decoration: none; }
        .sucesso { color: #00ff88; text-align: center; margin: 10px 0; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 CRIAR CONTA</h1>
        
        <div id="sucessoMsg" class="sucesso">Cadastro realizado! Redirecionando...</div>
        
        <input type="text" id="nome" placeholder="Seu nome">
        <input type="email" id="email" placeholder="Seu email">
        <input type="password" id="senha" placeholder="Sua senha">
        
        <button onclick="fazerCadastro()">CADASTRAR</button>
        
        <a href="index.html" class="link">Já tem conta? Faça login</a>
    </div>
    
    <script>
        function fazerCadastro() {
            const nome = document.getElementById('nome').value;
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;
            
            if (!nome || !email || !senha) {
                alert('Preencha todos os campos!');
                return;
            }
            
            // SIMULAÇÃO - Aqui você salvaria no banco de dados
            // Por enquanto, vamos apenas simular o cadastro
            
            document.getElementById('sucessoMsg').style.display = 'block';
            
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 2000);
        }
    </script>
</body>
          </html>
