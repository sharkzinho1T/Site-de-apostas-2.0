<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Bet - Cadastro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 30px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #dc2626, #ef4444);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .header p {
            opacity: 0.9;
            font-size: 16px;
        }
        
        .form-container {
            padding: 40px 30px;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #475569;
            font-weight: 500;
            font-size: 14px;
        }
        
        .form-input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e2e8f0;
            border-radius: 15px;
            font-size: 15px;
            transition: all 0.2s;
        }
        
        .form-input:focus {
            outline: none;
            border-color: #dc2626;
            box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.1);
        }
        
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 20px 0;
        }
        
        .checkbox-group input {
            width: 18px;
            height: 18px;
        }
        
        .checkbox-group label {
            color: #64748b;
            font-size: 14px;
        }
        
        .checkbox-group a {
            color: #dc2626;
            text-decoration: none;
            font-weight: 500;
        }
        
        .btn-cadastrar {
            width: 100%;
            padding: 15px;
            background: #dc2626;
            color: white;
            border: none;
            border-radius: 15px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
            margin: 20px 0;
        }
        
        .btn-cadastrar:hover {
            background: #b91c1c;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(220, 38, 38, 0.3);
        }
        
        .login-link {
            text-align: center;
            color: #64748b;
        }
        
        .login-link a {
            color: #dc2626;
            text-decoration: none;
            font-weight: 600;
        }
        
        .login-link a:hover {
            text-decoration: underline;
        }
        
        .erro {
            background: #fee2e2;
            color: #dc2626;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
        }
        
        .sucesso {
            background: #22c55e;
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📝 Criar Conta</h1>
            <p>Ganhe R$100 de bônus no primeiro depósito</p>
        </div>
        
        <div class="form-container">
            <div id="erroCadastro" class="erro"></div>
            <div id="sucessoCadastro" class="sucesso">Cadastro realizado! Redirecionando...</div>
            
            <form onsubmit="event.preventDefault(); fazerCadastro()">
                <div class="input-group">
                    <label>Nome completo</label>
                    <input type="text" class="form-input" id="nome" placeholder="Digite seu nome" required>
                </div>
                
                <div class="input-group">
                    <label>E-mail</label>
                    <input type="email" class="form-input" id="email" placeholder="seu@email.com" required>
                </div>
                
                <div class="input-group">
                    <label>Senha</label>
                    <input type="password" class="form-input" id="senha" placeholder="Mínimo 6 caracteres" required>
                </div>
                
                <div class="input-group">
                    <label>WhatsApp</label>
                    <input type="text" class="form-input" id="whatsapp" placeholder="(11) 99999-9999" required>
                </div>
                
                <div class="checkbox-group">
                    <input type="checkbox" id="termos" checked>
                    <label for="termos">Concordo com os <a href="#">Termos de Uso</a> e <a href="#">Política de Privacidade</a></label>
                </div>
                
                <button type="submit" class="btn-cadastrar">CRIAR CONTA</button>
            </form>
            
            <div class="login-link">
                Já tem uma conta? <a href="dashboard.html">Faça login</a>
            </div>
        </div>
    </div>
    
    <script>
        // Máscara para WhatsApp
        document.getElementById('whatsapp').addEventListener('input', function(e) {
            let value = e.target.value.replace(/\D/g, '');
            if (value.length > 11) value = value.slice(0, 11);
            
            if (value.length > 2) {
                value = '(' + value.slice(0, 2) + ') ' + value.slice(2);
            }
            if (value.length > 10) {
                value = value.slice(0, 10) + '-' + value.slice(10);
            }
            e.target.value = value;
        });
        
        // CONFIGURAÇÃO DO SUPABASE
        const SUPABASE_URL = 'https://SEU_ID_AQUI.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        async function fazerCadastro() {
            const nome = document.getElementById('nome').value;
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;
            const whatsapp = document.getElementById('whatsapp').value;
            const termos = document.getElementById('termos').checked;
            
            document.getElementById('erroCadastro').style.display = 'none';
            
            if (!nome || !email || !senha || !whatsapp) {
                document.getElementById('erroCadastro').textContent = 'Preencha todos os campos!';
                document.getElementById('erroCadastro').style.display = 'block';
                return;
            }
            
            if (senha.length < 6) {
                document.getElementById('erroCadastro').textContent = 'Senha deve ter no mínimo 6 caracteres!';
                document.getElementById('erroCadastro').style.display = 'block';
                return;
            }
            
            if (!termos) {
                document.getElementById('erroCadastro').textContent = 'Você precisa aceitar os termos!';
                document.getElementById('erroCadastro').style.display = 'block';
                return;
            }
            
            const btn = document.querySelector('button');
            btn.textContent = 'CADASTRANDO...';
            btn.disabled = true;
            
            try {
                // Verifica se email já existe
                const { data: existente } = await supabase
                    .from('usuarios')
                    .select('email')
                    .eq('email', email);
                
                if (existente && existente.length > 0) {
                    document.getElementById('erroCadastro').textContent = 'Este email já está cadastrado!';
                    document.getElementById('erroCadastro').style.display = 'block';
                    btn.textContent = 'CRIAR CONTA';
                    btn.disabled = false;
                    return;
                }
                
                // Insere novo usuário
                const { data, error } = await supabase
                    .from('usuarios')
                    .insert([{
                        nome: nome,
                        email: email,
                        senha: senha,
                        whatsapp: whatsapp,
                        saldo: 100 // Bônus de cadastro
                    }])
                    .select();
                
                if (error) throw error;
                
                if (data && data.length > 0) {
                    document.getElementById('sucessoCadastro').style.display = 'block';
                    
                    // Salva na localStorage
                    localStorage.setItem('usuario_logado', JSON.stringify(data[0]));
                    
                    // Redireciona após 2 segundos
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 2000);
                }
                
            } catch (err) {
                document.getElementById('erroCadastro').textContent = 'Erro: ' + err.message;
                document.getElementById('erroCadastro').style.display = 'block';
                btn.textContent = 'CRIAR CONTA';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
