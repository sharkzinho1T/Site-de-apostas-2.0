<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Bet - Cadastro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        body {
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: #1a1a1a;
            padding: 40px 30px;
            border-radius: 20px;
            width: 100%;
            max-width: 450px;
            border: 2px solid #ff3333;
            box-shadow: 0 0 30px rgba(255, 51, 51, 0.3);
        }
        
        h1 {
            color: #ff3333;
            text-align: center;
            margin-bottom: 40px;
            font-size: 36px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255, 51, 51, 0.5);
        }
        
        .linha-divisoria {
            border: none;
            height: 2px;
            background: linear-gradient(90deg, transparent, #ff3333, #ff6666, #ff3333, transparent);
            margin: 10px 0 25px 0;
            width: 100%;
        }
        
        .campo-label {
            color: #ff9999;
            font-size: 14px;
            font-weight: bold;
            margin-left: 5px;
            margin-bottom: 5px;
            display: block;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .campo-input {
            width: 100%;
            margin-bottom: 20px;
        }
        
        input {
            width: 100%;
            padding: 15px 20px;
            background: #2a2a2a;
            border: 2px solid #ff3333;
            border-radius: 10px;
            color: white;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #ff6666;
            box-shadow: 0 0 15px rgba(255, 51, 51, 0.5);
            background: #333333;
        }
        
        input::placeholder {
            color: #666;
        }
        
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, #ff3333, #ff6666);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 20px;
            margin: 30px 0 20px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 5px 15px rgba(255, 51, 51, 0.4);
        }
        
        button:active {
            transform: scale(0.98);
            background: linear-gradient(45deg, #ff1a1a, #ff4d4d);
            box-shadow: 0 2px 10px rgba(255, 51, 51, 0.8);
        }
        
        .link {
            color: #ff9999;
            text-align: center;
            margin-top: 20px;
            display: block;
            text-decoration: none;
            font-size: 16px;
        }
        
        .link:hover {
            color: #ff3333;
        }
        
        .erro {
            color: #ff3333;
            text-align: center;
            margin: 10px 0;
            display: none;
            padding: 10px;
            background: rgba(255, 51, 51, 0.1);
            border-radius: 5px;
            border-left: 4px solid #ff3333;
        }
        
        .sucesso {
            color: #ff6666;
            text-align: center;
            margin: 10px 0;
            display: none;
            padding: 10px;
            background: rgba(255, 102, 102, 0.1);
            border-radius: 5px;
            border-left: 4px solid #ff6666;
        }
        
        .footer-text {
            text-align: center;
            color: #666;
            font-size: 12px;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔴 CADASTRO</h1>
        
        <hr class="linha-divisoria">
        
        <div id="erroCadastro" class="erro"></div>
        <div id="sucessoCadastro" class="sucesso">Cadastro realizado! Redirecionando...</div>
        
        <div class="campo-label">NOME</div>
        <div class="campo-input">
            <input type="text" id="nome" placeholder="Seu nome completo">
        </div>
        
        <hr class="linha-divisoria">
        
        <div class="campo-label">E-MAIL</div>
        <div class="campo-input">
            <input type="email" id="email" placeholder="seu@email.com">
        </div>
        
        <hr class="linha-divisoria">
        
        <div class="campo-label">SENHA</div>
        <div class="campo-input">
            <input type="password" id="senha" placeholder="Mínimo 6 caracteres">
        </div>
        
        <hr class="linha-divisoria">
        
        <div class="campo-label">WHATSAPP</div>
        <div class="campo-input">
            <input type="text" id="whatsapp" placeholder="(11) 99999-9999" maxlength="15">
        </div>
        
        <hr class="linha-divisoria">
        
        <button onclick="fazerCadastro()">CADASTRAR</button>
        
        <a href="index.html" class="link">Já tem conta? Faça login</a>
        
        <div class="footer-text">
            🔴 Ao se cadastrar, você ganha R$100 de bônus!
        </div>
    </div>
    
    <script>
        // Máscara para WhatsApp
        document.getElementById('whatsapp').addEventListener('input', function(e) {
            let value = e.target.value.replace(/\D/g, '');
            if (value.length > 11) value = value.slice(0, 11);
            
            if (value.length > 2) {
                value = '(' + value.slice(0, 2) + ') ' + value.slice(2);
            }
            if (value.length > 10) {
                value = value.slice(0, 10) + '-' + value.slice(10);
            }
            e.target.value = value;
        });
        
        // ============================================
        // SUAS CREDENCIAIS DO SUPABASE (COLE AQUI!)
        // ============================================
        const SUPABASE_URL = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRxc3N0b3Bqc3p0dGJnYnR1eXl5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1OTc4NDgsImV4cCI6MjA4OTE3Mzg0OH0.6q8AinOjG2zF9xwFQtedFiAWvyA8XJsLtClBr5gxMPw';
        
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        async function fazerCadastro() {
            const nome = document.getElementById('nome').value;
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;
            const whatsapp = document.getElementById('whatsapp').value;
            
            document.getElementById('erroCadastro').style.display = 'none';
            
            if (!nome || !email || !senha || !whatsapp) {
                document.getElementById('erroCadastro').textContent = 'Preencha todos os campos!';
                document.getElementById('erroCadastro').style.display = 'block';
                return;
            }
            
            if (senha.length < 6) {
                document.getElementById('erroCadastro').textContent = 'Senha deve ter no mínimo 6 caracteres!';
                document.getElementById('erroCadastro').style.display = 'block';
                return;
            }
            
            const btn = document.querySelector('button');
            btn.textContent = 'CADASTRANDO...';
            btn.disabled = true;
            
            try {
                // Verifica se email já existe
                const { data: existente } = await supabase
                    .from('usuarios')
                    .select('email')
                    .eq('email', email);
                
                if (existente && existente.length > 0) {
                    document.getElementById('erroCadastro').textContent = 'Este email já está cadastrado!';
                    document.getElementById('erroCadastro').style.display = 'block';
                    btn.textContent = 'CADASTRAR';
                    btn.disabled = false;
                    return;
                }
                
                // Insere novo usuário com todas as colunas
                const { data, error } = await supabase
                    .from('usuarios')
                    .insert([{ 
                        nome: nome, 
                        email: email, 
                        senha: senha,
                        whatsapp: whatsapp,
                        saldo: 100, // Bônus de cadastro
                        chave_pix: '',
                        tipo_pix: '',
                        data_cadastro: new Date().toISOString()
                    }]);
                
                if (error) throw error;
                
                document.getElementById('sucessoCadastro').style.display = 'block';
                
                // Pega o usuário que acabou de cadastrar
                const { data: novoUsuario } = await supabase
                    .from('usuarios')
                    .select('*')
                    .eq('email', email)
                    .single();
                
                if (novoUsuario) {
                    localStorage.setItem('usuario_logado', JSON.stringify({
                        id: novoUsuario.id,
                        nome: novoUsuario.nome,
                        email: novoUsuario.email,
                        whatsapp: novoUsuario.whatsapp,
                        saldo: novoUsuario.saldo
                    }));
                }
                
                // Redireciona para escolha de PIX
                setTimeout(() => {
                    window.location.href = 'escolher-pix.html';
                }, 2000);
                
            } catch (err) {
                document.getElementById('erroCadastro').textContent = 'Erro: ' + err.message;
                document.getElementById('erroCadastro').style.display = 'block';
                btn.textContent = 'CADASTRAR';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
