<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Bet - Cadastro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        
        body {
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        .modal {
            background: white;
            width: 90%;
            max-width: 400px;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            animation: slideDown 0.3s ease;
        }
        
        @keyframes slideDown {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        
        .modal h2 {
            color: #dc2626;
            text-align: center;
            margin-bottom: 30px;
            font-size: 28px;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: bold;
        }
        
        .input-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 5px;
            font-size: 16px;
        }
        
        .input-group input:focus {
            outline: none;
            border-color: #dc2626;
        }
        
        .btn-cadastrar {
            width: 100%;
            padding: 15px;
            background: #dc2626;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin: 20px 0;
        }
        
        .btn-cadastrar:hover {
            background: #b91c1c;
        }
        
        .links {
            text-align: center;
        }
        
        .links a {
            color: #dc2626;
            text-decoration: none;
            display: block;
            margin: 10px 0;
        }
        
        .links a:hover {
            text-decoration: underline;
        }
        
        .btn-fechar {
            position: absolute;
            top: 10px;
            right: 10px;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #666;
        }
        
        .btn-fechar:hover {
            color: #dc2626;
        }
    </style>
</head>
<body>
    <div class="modal">
        <h2>🔐 CADASTRO</h2>
        
        <div class="input-group">
            <label>Nome completo</label>
            <input type="text" id="nome" placeholder="Digite seu nome">
        </div>
        
        <div class="input-group">
            <label>E-mail</label>
            <input type="email" id="email" placeholder="seu@email.com">
        </div>
        
        <div class="input-group">
            <label>Senha</label>
            <input type="password" id="senha" placeholder="Mínimo 6 caracteres">
        </div>
        
        <div class="input-group">
            <label>WhatsApp</label>
            <input type="text" id="whatsapp" placeholder="(11) 99999-9999">
        </div>
        
        <button class="btn-cadastrar" onclick="alert('Cadastro realizado com sucesso! (Simulação)')">CADASTRAR</button>
        
        <div class="links">
            <a href="#" onclick="window.location.href='dashboard.html'">← Voltar para o site</a>
        </div>
    </div>
</body>
</html>
