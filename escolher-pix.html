<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Bet - Escolha seu PIX</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        body {
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: #1a1a1a;
            padding: 40px 30px;
            border-radius: 20px;
            width: 100%;
            max-width: 450px;
            border: 2px solid #ff3333;
            box-shadow: 0 0 30px rgba(255, 51, 51, 0.3);
        }
        
        h1 {
            color: #ff3333;
            text-align: center;
            margin-bottom: 30px;
            font-size: 32px;
            text-transform: uppercase;
        }
        
        h2 {
            color: #ff9999;
            font-size: 18px;
            margin: 20px 0 10px;
        }
        
        .pix-options {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin: 30px 0;
        }
        
        .pix-option {
            background: #2a2a2a;
            border: 2px solid #ff3333;
            border-radius: 15px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .pix-option:hover {
            background: #333;
            border-color: #ff6666;
        }
        
        .pix-option.selected {
            background: #ff3333;
            border-color: white;
        }
        
        .pix-option.selected .pix-icon,
        .pix-option.selected .pix-text {
            color: white;
        }
        
        .pix-icon {
            font-size: 32px;
            color: #ff3333;
        }
        
        .pix-text {
            color: white;
            font-size: 16px;
        }
        
        .pix-text small {
            color: #999;
            font-size: 12px;
            display: block;
        }
        
        .input-group {
            margin: 20px 0;
            display: none;
        }
        
        .input-group.show {
            display: block;
        }
        
        label {
            color: #ff9999;
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
        }
        
        input {
            width: 100%;
            padding: 15px;
            background: #2a2a2a;
            border: 2px solid #ff3333;
            border-radius: 10px;
            color: white;
            font-size: 16px;
        }
        
        input:focus {
            outline: none;
            border-color: #ff6666;
            box-shadow: 0 0 15px rgba(255, 51, 51, 0.5);
        }
        
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, #ff3333, #ff6666);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 18px;
            margin: 20px 0;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .link {
            color: #ff9999;
            text-align: center;
            display: block;
            text-decoration: none;
            margin-top: 20px;
        }
        
        .info {
            color: #ff9999;
            text-align: center;
            font-size: 14px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💰 ESCOLHA SEU PIX</h1>
        
        <div class="pix-options">
            <div class="pix-option" onclick="selectPix('cpf')" id="option-cpf">
                <div class="pix-icon">🔢</div>
                <div class="pix-text">
                    <strong>CPF</strong>
                    <small>123.456.789-00</small>
                </div>
            </div>
            
            <div class="pix-option" onclick="selectPix('email')" id="option-email">
                <div class="pix-icon">📧</div>
                <div class="pix-text">
                    <strong>E-mail</strong>
                    <small>seu@email.com</small>
                </div>
            </div>
            
            <div class="pix-option" onclick="selectPix('phone')" id="option-phone">
                <div class="pix-icon">📱</div>
                <div class="pix-text">
                    <strong>Telefone</strong>
                    <small>(11) 99999-9999</small>
                </div>
            </div>
            
            <div class="pix-option" onclick="selectPix('random')" id="option-random">
                <div class="pix-icon">🔑</div>
                <div class="pix-text">
                    <strong>Chave aleatória</strong>
                    <small>código de 32 caracteres</small>
                </div>
            </div>
        </div>
        
        <div id="input-cpf" class="input-group">
            <label>Digite seu CPF:</label>
            <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14">
        </div>
        
        <div id="input-email" class="input-group">
            <label>Digite seu e-mail:</label>
            <input type="email" id="email" placeholder="seu@email.com">
        </div>
        
        <div id="input-phone" class="input-group">
            <label>Digite seu telefone:</label>
            <input type="text" id="phone" placeholder="(11) 99999-9999" maxlength="15">
        </div>
        
        <div id="input-random" class="input-group">
            <label>Digite sua chave aleatória:</label>
            <input type="text" id="random" placeholder="código de 32 caracteres">
        </div>
        
        <button id="btnContinue" onclick="continuar()" disabled>CONTINUAR</button>
        
        <div class="info">
            🔴 Seus dados são seguros e criptografados
        </div>
        
        <a href="dashboard.html" class="link">Pular por agora</a>
    </div>
    
    <script>
        // ============================================
        // SUAS CREDENCIAIS DO SUPABASE (COLE AQUI!)
        // ============================================
        const SUPABASE_URL = 'https://dqsstopjszttbgbtuyyy.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRxc3N0b3Bqc3p0dGJnYnR1eXl5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1OTc4NDgsImV4cCI6MjA4OTE3Mzg0OH0.6q8AinOjG2zF9xwFQtedFiAWvyA8XJsLtClBr5gxMPw';
        
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        let selectedType = null;
        
        function selectPix(type) {
            document.querySelectorAll('.pix-option').forEach(opt => {
                opt.classList.remove('selected');
            });
            
            document.getElementById(`option-${type}`).classList.add('selected');
            selectedType = type;
            
            document.querySelectorAll('.input-group').forEach(group => {
                group.classList.remove('show');
            });
            
            document.getElementById(`input-${type}`).classList.add('show');
            
            document.getElementById('btnContinue').disabled = false;
        }
        
        async function continuar() {
            if (!selectedType) return;
            
            let valor = '';
            switch(selectedType) {
                case 'cpf':
                    valor = document.getElementById('cpf').value;
                    if (!valor) {
                        alert('Digite seu CPF!');
                        return;
                    }
                    break;
                case 'email':
                    valor = document.getElementById('email').value;
                    if (!valor) {
                        alert('Digite seu e-mail!');
                        return;
                    }
                    break;
                case 'phone':
                    valor = document.getElementById('phone').value;
                    if (!valor) {
                        alert('Digite seu telefone!');
                        return;
                    }
                    break;
                case 'random':
                    valor = document.getElementById('random').value;
                    if (!valor) {
                        alert('Digite sua chave aleatória!');
                        return;
                    }
                    break;
            }
            
            // Salva no localStorage
            localStorage.setItem('pix_chave', valor);
            localStorage.setItem('pix_tipo', selectedType);
            
            // Salvar no Supabase
            try {
                const usuarioLogado = JSON.parse(localStorage.getItem('usuario_logado'));
                if (usuarioLogado) {
                    const { error } = await supabase
                        .from('usuarios')
                        .update({ 
                            chave_pix: valor,
                            tipo_pix: selectedType 
                        })
                        .eq('id', usuarioLogado.id);
                    
                    if (error) console.error('Erro ao salvar PIX:', error);
                }
            } catch (err) {
                console.error('Erro:', err);
            }
            
            window.location.href = 'depositar.html';
        }
        
        // Máscara para CPF
        document.getElementById('cpf')?.addEventListener('input', function(e) {
            let value = e.target.value.replace(/\D/g, '');
            if (value.length > 11) value = value.slice(0, 11);
            
            if (value.length > 9) {
                value = value.slice(0, 3) + '.' + value.slice(3, 6) + '.' + value.slice(6, 9) + '-' + value.slice(9);
            } else if (value.length > 6) {
                value = value.slice(0, 3) + '.' + value.slice(3, 6) + '.' + value.slice(6);
            } else if (value.length > 3) {
                value = value.slice(0, 3) + '.' + value.slice(3);
            }
            e.target.value = value;
        });
        
        // Máscara para telefone
        document.getElementById('phone')?.addEventListener('input', function(e) {
            let value = e.target.value.replace(/\D/g, '');
            if (value.length > 11) value = value.slice(0, 11);
            
            if (value.length > 2) {
                value = '(' + value.slice(0, 2) + ') ' + value.slice(2);
            }
            if (value.length > 10) {
                value = value.slice(0, 10) + '-' + value.slice(10);
            }
            e.target.value = value;
        });
    </script>
</body>
</html>
